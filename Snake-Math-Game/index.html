<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rắn Săn Mồi - Luyện Phép Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #83a4d4;
            --bg-grad-2: #b6fbff;
            --board-1: #dcf8f5;
            --board-2: #c6f0ea;
            --snake-head: #ff9f43;
            --snake-body: #feca57;
            --text-dark: #222f3e;
            --apple: #ff4757;
            --apple-leaf: #2ed573;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 35px 35px;
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), inset 0 0 0 2px rgba(255,255,255,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
        }

        .score-box {
            background: white;
            padding: 12px 25px;
            border-radius: 20px;
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            color: #ee5253;
            box-shadow: 0 8px 15px rgba(0,0,0,0.08);
            border: 3px solid #ffeaa7;
            transition: transform 0.1s;
        }

        .question-box {
            background: #5f27cd;
            color: white;
            padding: 15px 35px;
            border-radius: 25px;
            font-family: 'Fredoka One', cursive;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(95, 39, 205, 0.4);
            letter-spacing: 2px;
            border: 4px solid #fff;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .game-wrapper {
            position: relative;
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid #fff;
        }

        canvas {
            display: block;
            border-radius: 12px;
            background-color: var(--board-1);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay h2 {
            font-family: 'Fredoka One', cursive;
            color: #ff6b6b;
            font-size: 45px;
            margin: 0 0 10px 0;
            text-shadow: 3px 3px 0px #ffeaa7;
        }

        .overlay .result-text {
            font-size: 24px;
            color: #2e86de;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .overlay .fail-reason {
            font-size: 22px;
            color: #ee5253;
            font-weight: 800;
            margin-bottom: 30px;
            background: #ffefef;
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px dashed #ff9ff3;
        }

        .btn-play {
            background: #10ac84;
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 26px;
            font-family: 'Fredoka One', cursive;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(16, 172, 132, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #fff;
        }

        .btn-play:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 25px rgba(16, 172, 132, 0.5);
            background: #1dd1a1;
        }

        .btn-play:active {
            transform: translateY(2px) scale(0.95);
        }

        .controls-hint {
            margin-top: 25px;
            font-weight: 800;
            color: #576574;
            font-size: 18px;
            background: rgba(255,255,255,0.7);
            padding: 12px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #fff;
        }
        
        .food-bounce {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div class="score-box" id="scoreBox">⭐ Điểm: <span id="score">0</span></div>
        <div class="question-box" id="question">? x ? = ?</div>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        
        <div class="overlay" id="startScreen">
            <h2 style="color: #10ac84; text-shadow: 3px 3px 0px #c8d6e5;">Bé Học Cửu Chương</h2>
            <p class="result-text" style="text-align: center; max-width: 80%;">Hãy điều khiển Rắn ăn số là kết quả đúng của phép tính nhé!</p>
            <button class="btn-play" onclick="startGame()">Bắt Đầu Đi!</button>
        </div>

        <div class="overlay" id="gameOverScreen" style="display: none;">
            <h2>Ôi Không!</h2>
            <div class="result-text">Điểm của bé: <span id="finalScore">0</span> ⭐</div>
            <div class="fail-reason" id="failReason">Cố gắng lần sau nhé!</div>
            <button class="btn-play" onclick="startGame()">Chơi Lại Nào!</button>
        </div>
    </div>
    
    <div class="controls-hint">
        🎮 Dùng các phím mũi tên ⬅️ ⬆️ ⬇️ ➡️ trên bàn phím để di chuyển
    </div>
    <footer style="margin-top: 2rem; color: #576574; font-weight: bold; text-align: center;">© Bản quyền Người tạo nội dung: Thầy Đường Khánh Sơn. MLAB.</footer>
</div>

<script>
    // Canvas & Context Setup
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const COLS = 20;
    const ROWS = 20;
    const CELL = canvas.width / COLS;

    // Polyfill for roundRect just in case
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
      }
    }

    // Variables
    let snake = [];
    let dx = 0, dy = 0;
    let nextDx = 0, nextDy = 0;
    let inputQueue = [];
    let foods = [];
    let score = 0;
    let gameLoop = null;
    let currentQuestion = {};
    let isPlaying = false;

    // Speed setting (Slower for beginners/kids)
    const SPEED_MS = 320; 

    function startGame() {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("gameOverScreen").style.display = "none";
        
        // Setup initial snake configuration
        snake = [
            { x: 10, y: 10 },
            { x: 10, y: 11 },
            { x: 10, y: 12 }
        ];
        
        dx = 0; dy = -1;
        nextDx = 0; nextDy = -1;
        inputQueue = [];
        score = 0;
        updateScore();
        isPlaying = true;
        
        generateQuestion();
        
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, SPEED_MS);
        
        draw();
    }

    function generateQuestion() {
        // Random multiplication table from 2 to 9
        let a = Math.floor(Math.random() * 8) + 2; 
        let b = Math.floor(Math.random() * 9) + 1; // 1 to 9
        
        // Randomly swap a and b for visual variety
        if (Math.random() > 0.5) {
            let tmp = a; a = b; b = tmp;
        }
        
        let ans = a * b;
        currentQuestion = { a: a, b: b, ans: ans };
        
        // Add animation class
        let qbox = document.getElementById("question");
        qbox.innerText = `${a} × ${b} = ?`;
        qbox.classList.remove("food-bounce");
        void qbox.offsetWidth; // trigger reflow
        qbox.classList.add("food-bounce");
        
        foods = [];
        
        // 1 Correct answer
        placeFood(ans, true);
        
        // 3 Wrong answers
        let wrongSet = new Set();
        while (wrongSet.size < 3) {
            let offset = Math.floor(Math.random() * 11) - 5;
            if (offset === 0) offset = 2;
            let fakeAns = ans + offset;
            
            // Generate some common trick answers
            if (Math.random() < 0.25 && a + b !== ans) {
                fakeAns = a + b;
            } else if (Math.random() < 0.25) {
                fakeAns = a * (b + (Math.random() > 0.5 ? 1 : -1));
            }
            
            if (fakeAns > 0 && fakeAns !== ans && !wrongSet.has(fakeAns)) {
                wrongSet.add(fakeAns);
            }
        }
        
        wrongSet.forEach(val => placeFood(val, false));
    }

    function placeFood(value, isCorrect) {
        let emptySpaces = [];
        for (let x = 0; x < COLS; x++) {
            for (let y = 0; y < ROWS; y++) {
                // Ignore the very edge to prevent foods trapped in corners
                if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) continue;
                
                let isSnake = snake.some(s => s.x === x && s.y === y);
                let isFood = foods.some(f => f.x === x && f.y === y);
                
                // Ensure foods spawn a bit further away from the snake head to give reaction time
                let distToHead = Math.abs(x - snake[0].x) + Math.abs(y - snake[0].y);
                
                if (!isSnake && !isFood && distToHead > 3) {
                    emptySpaces.push({ x: x, y: y });
                }
            }
        }
        
        if (emptySpaces.length > 0) {
            let rnd = Math.floor(Math.random() * emptySpaces.length);
            foods.push({
                x: emptySpaces[rnd].x,
                y: emptySpaces[rnd].y,
                value: value,
                isCorrect: isCorrect
            });
        }
    }

    // Input listening
    document.addEventListener("keydown", e => {
        if (!isPlaying) return;
        
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
            e.preventDefault(); // Stop window scroll
        }

        let direction = null;
        if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") direction = { x: 0, y: -1 };
        else if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") direction = { x: 0, y: 1 };
        else if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") direction = { x: -1, y: 0 };
        else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") direction = { x: 1, y: 0 };
        
        if (direction) {
            // Buffer up to 2 commands
            if (inputQueue.length < 2) {
                inputQueue.push(direction);
            }
        }
    });

    function update() {
        if (!isPlaying) return;

        // Process buffered input
        if (inputQueue.length > 0) {
            let inp = inputQueue.shift();
            // Validate: cannot reverse direction directly
            if (inp.x !== 0 && dx !== -inp.x) {
                nextDx = inp.x;
                nextDy = 0;
            } else if (inp.y !== 0 && dy !== -inp.y) {
                nextDx = 0;
                nextDy = inp.y;
            }
        }

        dx = nextDx;
        dy = nextDy;

        // New Head position
        let newHead = { x: snake[0].x + dx, y: snake[0].y + dy };

        // 1. Collision Check - Walls
        if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
            gameOver("Rắn đụng tường mất rồi!");
            return;
        }

        // 2. Collision Check - Self
        if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
            gameOver("Ai da! Rắn tự cắn vào đuôi rồi!");
            return;
        }

        // Move head forward
        snake.unshift(newHead);

        // 3. Collision Check - Food
        let eatenIdx = foods.findIndex(f => f.x === newHead.x && f.y === newHead.y);
        
        if (eatenIdx !== -1) {
            let eatenFood = foods[eatenIdx];
            if (eatenFood.isCorrect) {
                score += 10;
                updateScore();
                generateQuestion();
                // Tail remains (snake grows)
            } else {
                // Ate the wrong answer
                gameOver(`Sai rồi! ${currentQuestion.a} × ${currentQuestion.b} = ${currentQuestion.ans}`);
                return;
            }
        } else {
            // Did not eat, so pop the tail
            snake.pop();
        }

        draw();
    }
    
    function draw() {
        // Clear frame
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw checkered board background
        for (let i = 0; i < COLS; i++) {
            for (let j = 0; j < ROWS; j++) {
                ctx.fillStyle = (i + j) % 2 === 0 ? "var(--board-1)" : "var(--board-2)";
                ctx.fillRect(i * CELL, j * CELL, CELL, CELL);
            }
        }

        // Draw Foods (the math values)
        foods.forEach(f => {
            // Shadow
            ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetY = 2;

            // Apple base
            ctx.fillStyle = "var(--apple)";
            ctx.beginPath();
            ctx.arc(f.x * CELL + CELL/2, f.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Leaf
            ctx.fillStyle = "var(--apple-leaf)";
            ctx.beginPath();
            ctx.ellipse(f.x * CELL + CELL/2 + 5, f.y * CELL + 6, 5, 3, Math.PI/4, 0, Math.PI*2);
            ctx.fill();

            // Reset shadow before text
            ctx.shadowColor = "transparent";
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // Text Label
            ctx.fillStyle = "white";
            ctx.font = "bold 16px 'Fredoka One', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(f.value, f.x * CELL + CELL/2, f.y * CELL + CELL/2 + 2);
        });

        // Draw Snake
        snake.forEach((s, idx) => {
            ctx.fillStyle = idx === 0 ? "var(--snake-head)" : "var(--snake-body)";
            
            ctx.beginPath();
            // Slightly smaller than cell for nice styling
            let roundRadius = idx === 0 ? 8 : (idx === snake.length - 1 ? 6 : 4);
            ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, roundRadius);
            ctx.fill();

            // Details on head
            if (idx === 0) {
                ctx.fillStyle = "white"; // Whites of eyes
                let eyeOffset = 6;
                let eyeRad = 4.5;
                let pupilRad = 2;
                
                let cx = s.x * CELL + CELL/2;
                let cy = s.y * CELL + CELL/2;

                let e1x, e1y, e2x, e2y;
                
                // Reposition based on direction
                if (dx === 1) { // Right
                    e1x = cx + eyeOffset; e1y = cy - eyeOffset + 2;
                    e2x = cx + eyeOffset; e2y = cy + eyeOffset - 2;
                } else if (dx === -1) { // Left
                    e1x = cx - eyeOffset; e1y = cy - eyeOffset + 2;
                    e2x = cx - eyeOffset; e2y = cy + eyeOffset - 2;
                } else if (dy === 1) { // Down
                    e1x = cx - eyeOffset + 2; e1y = cy + eyeOffset;
                    e2x = cx + eyeOffset - 2; e2y = cy + eyeOffset;
                } else { // Up / Start
                    e1x = cx - eyeOffset + 2; e1y = cy - eyeOffset;
                    e2x = cx + eyeOffset - 2; e2y = cy - eyeOffset;
                }

                ctx.beginPath(); ctx.arc(e1x, e1y, eyeRad, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x, e2y, eyeRad, 0, Math.PI*2); ctx.fill();
                
                // Pupils look in movement direction
                ctx.fillStyle = "#1e272e";
                let pupOx = dx === 0 ? 0 : dx > 0 ? 1.5 : -1.5;
                let pupOy = dy === 0 ? 0 : dy > 0 ? 1.5 : -1.5;

                ctx.beginPath(); ctx.arc(e1x + pupOx, e1y + pupOy, pupilRad, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x + pupOx, e2y + pupOy, pupilRad, 0, Math.PI*2); ctx.fill();
            }
        });
    }

    function gameOver(reason) {
        isPlaying = false;
        clearInterval(gameLoop);
        document.getElementById("gameOverScreen").style.display = "flex";
        document.getElementById("finalScore").innerText = score;
        document.getElementById("failReason").innerText = reason;
    }

    function updateScore() {
        document.getElementById("score").innerText = score;
        let sbox = document.getElementById("scoreBox");
        sbox.style.transform = "scale(1.15)";
        setTimeout(() => { sbox.style.transform = "scale(1)"; }, 150);
    }
    
    // Initial draw
    draw();
</script>
</body>
</html>
